# yaml-language-server: $schema=https://raw.githubusercontent.com/nf-core/modules/master/modules/meta-schema.json
name: "fasterqdump"
description: Extracts FASTQ files from prefetched SRA-accession 
keywords:
  - sra
  - fastq
  - extract
  - ncbi
tools:
  - "sra-tools fasterqdump":
      description: "Extracts data in FASTQ or FASTA format from SRA-accessions"
      homepage: "https://github.com/ncbi/sra-tools"
      documentation: "https://github.com/ncbi/sra-tools/wiki/HowTo:-fasterq-dump"
      tool_dev_url: ""
      doi: ""
      licence: null
      identifier: null

input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. `[ id:'sample1' ]`
    - prefetch:
        type: file
        description: Downloaded SRA-accession
        pattern: "*.sra"
        ontologies:
          - edam: "http://edamontology.org/format_3699" # VDB

output:
  fastq:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'sample1' ]`
      - "*.fastq.gz":
          type: file
          description: gzipped FASTQ files extracted from SRA-accession
          pattern: "*.fastq.gz"
          ontologies:
            - edam: "http://edamontology.org/format_3989" # GZIP
  versions:
    - versions.yml:
        type: file
        description: File containing software versions
        pattern: "versions.yml"
        ontologies:
          - edam: http://edamontology.org/format_3750 # YAML

authors:
  - "@Ethan-Hetrick"
maintainers:
  - "@kitkatm16"
  - "@jennahamlin"
